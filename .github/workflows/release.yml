name: release-core

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: release-core-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Run tests
        run: make test

  build-release:
    needs: test
    runs-on: ubuntu-latest
    timeout-minutes: 120
    env:
      RELEASE_VERSION: ${{ github.ref_name || 'dev' }}
      FFMPEG_REF: n8.0
      LIBVPX_REF: v1.16.0
      EMSCRIPTEN_VERSION: 5.0.2
      DOCKER_IMAGE: clip2sticker-core-build:ci
    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build cached toolchain image
        uses: docker/build-push-action@v6
        with:
          context: .
          load: true
          tags: ${{ env.DOCKER_IMAGE }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Run release build
        run: make docker-release SKIP_DOCKER_BUILD=1 DOCKER_IMAGE="$DOCKER_IMAGE"

      - name: Upload configure logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: configure-logs-${{ github.ref_name }}
          path: |
            build/ffmpeg/config.log
            build/libvpx/config.log
          if-no-files-found: ignore

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: clip2sticker-core-${{ github.ref_name }}
          path: |
            dist/ffmpeg-core.js
            dist/ffmpeg-core.wasm
            dist/manifest.json
            dist/SHA256SUMS
          if-no-files-found: error
          retention-days: 14

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/ffmpeg-core.js
            dist/ffmpeg-core.wasm
            dist/manifest.json
            dist/SHA256SUMS
          fail_on_unmatched_files: true
