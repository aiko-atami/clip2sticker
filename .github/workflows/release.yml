name: release-ffmpeg

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

permissions:
  contents: write

concurrency:
  group: release-ffmpeg-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22

      - name: Install workspace dependencies
        run: npm install

      - name: Run tests
        run: make -C packages/ffmpeg test

  build-release:
    needs: test
    runs-on: ubuntu-latest
    timeout-minutes: 120
    env:
      FFMPEG_REF: n8.0
      LIBVPX_REF: v1.16.0
      EMSCRIPTEN_VERSION: 5.0.2
      DOCKER_IMAGE: clip2sticker-ffmpeg-build:ci
    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Resolve release metadata
        id: meta
        run: |
          if [[ "${GITHUB_REF_TYPE}" == "tag" ]]; then
            release_version="${GITHUB_REF_NAME}"
          else
            release_version="manual-${GITHUB_SHA::12}"
          fi

          archive_name="clip2sticker-ffmpeg-${release_version}.tar.gz"

          {
            echo "release_version=${release_version}"
            echo "archive_name=${archive_name}"
          } >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build cached toolchain image
        uses: docker/build-push-action@v7
        with:
          context: packages/ffmpeg
          load: true
          tags: ${{ env.DOCKER_IMAGE }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Run release build
        env:
          RELEASE_VERSION: ${{ steps.meta.outputs.release_version }}
        run: make -C packages/ffmpeg docker-release SKIP_DOCKER_BUILD=1 DOCKER_IMAGE="$DOCKER_IMAGE"

      - name: Verify release payload
        run: node packages/ffmpeg/scripts/verify-release.mjs packages/ffmpeg/dist

      - name: Package release archive
        run: tar -C packages/ffmpeg/dist -czf "${{ steps.meta.outputs.archive_name }}" ffmpeg.js ffmpeg.wasm manifest.json SHA256SUMS

      - name: Upload configure logs on failure
        if: failure()
        uses: actions/upload-artifact@v6
        with:
          name: configure-logs-${{ steps.meta.outputs.release_version }}
          path: |
            packages/ffmpeg/build/ffmpeg/config.log
            packages/ffmpeg/build/libvpx/config.log
          if-no-files-found: ignore

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v6
        with:
          name: clip2sticker-ffmpeg-${{ steps.meta.outputs.release_version }}
          path: |
            packages/ffmpeg/dist/ffmpeg.js
            packages/ffmpeg/dist/ffmpeg.wasm
            packages/ffmpeg/dist/manifest.json
            packages/ffmpeg/dist/SHA256SUMS
            ${{ steps.meta.outputs.archive_name }}
          if-no-files-found: error
          retention-days: 14

      - name: Create GitHub release
        if: github.ref_type == 'tag'
        uses: softprops/action-gh-release@v2
        with:
          name: clip2sticker-ffmpeg ${{ steps.meta.outputs.release_version }}
          tag_name: ${{ github.ref_name }}
          generate_release_notes: true
          prerelease: ${{ contains(github.ref_name, '-') }}
          files: |
            packages/ffmpeg/dist/ffmpeg.js
            packages/ffmpeg/dist/ffmpeg.wasm
            packages/ffmpeg/dist/manifest.json
            packages/ffmpeg/dist/SHA256SUMS
            ${{ steps.meta.outputs.archive_name }}
          fail_on_unmatched_files: true
