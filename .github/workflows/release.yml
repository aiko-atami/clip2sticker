name: release-core

on:
  push:
    tags:
      - "v*"

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

permissions:
  contents: write

jobs:
  build-release:
    runs-on: ubuntu-latest
    env:
      RELEASE_VERSION: ${{ github.ref_name }}
      FFMPEG_REF: n8.0
      LIBVPX_REF: v1.16.0
      EMSCRIPTEN_VERSION: 4.0.22
    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Build Docker image
        run: docker build -t clip2sticker-core-build .

      - name: Run release build
        run: >
          docker run --rm
          -e RELEASE_VERSION
          -e FFMPEG_REF
          -e LIBVPX_REF
          -e EMSCRIPTEN_VERSION
          -v "$PWD:/workspace"
          -w /workspace
          clip2sticker-core-build
          bash ./scripts/release-build.sh

      - name: Upload configure logs on failure
        if: failure()
        uses: actions/upload-artifact@v6
        with:
          name: configure-logs-${{ github.ref_name }}
          path: |
            build/ffmpeg/config.log
            build/libvpx/config.log
          if-no-files-found: ignore

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v6
        with:
          name: clip2sticker-core-${{ github.ref_name }}
          path: |
            dist/ffmpeg-core.js
            dist/ffmpeg-core.wasm
            dist/ffmpeg-core.worker.js
            dist/manifest.json
            dist/SHA256SUMS

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/ffmpeg-core.js
            dist/ffmpeg-core.wasm
            dist/ffmpeg-core.worker.js
            dist/manifest.json
            dist/SHA256SUMS
